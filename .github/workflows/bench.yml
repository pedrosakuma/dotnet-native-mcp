name: Bench

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench.yml
      - .github/actions/run-bench/**
      - Directory.Build.props
      - Directory.Packages.props
      - DotnetNativeMcp.slnx
      - global.json
      - src/**
      - tests/bench/**
      - tests/DotnetNativeMcp.Core.Tests/**
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled]
    paths:
      - .github/workflows/bench.yml
      - .github/actions/run-bench/**
      - Directory.Build.props
      - Directory.Packages.props
      - DotnetNativeMcp.slnx
      - global.json
      - src/**
      - tests/bench/**
      - tests/DotnetNativeMcp.Core.Tests/**

# Workflow scope is read-only. The two split jobs below opt in to the
# minimum permission each path needs — see issue #106 for the design.
# GitHub Actions does not allow expressions in the `permissions:` map
# (values must be literal read/write/none), so the split is enforced
# at the job level instead of via a dynamic permission on a single job.
permissions:
  contents: read

jobs:
  # Push / workflow_dispatch path: publishes new BenchmarkDotNet baselines
  # to the gh-pages branch and therefore needs contents:write. PR-controlled
  # code never reaches this job because of the event filter on `if:`.
  bench-push:
    name: BenchmarkDotNet (push baseline)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-bench
        with:
          auto-push: 'true'
          fail-on-alert: 'false'

  # PR path: only runs when a maintainer applies the `perf` label, and
  # then executes attacker-controllable bench fixtures under a strictly
  # read-only GITHUB_TOKEN. The benchmark action still alerts on
  # regressions (fail-on-alert: 'true') and never pushes a baseline.
  bench-pr:
    name: BenchmarkDotNet (PR alert-only)
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'perf')
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-bench
        with:
          auto-push: 'false'
          fail-on-alert: 'true'
