name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fuzz:
    name: Parser fuzz smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install NativeAOT toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run parser fuzz smoke tests
        run: >
          dotnet test tests/DotnetNativeMcp.Core.Tests/DotnetNativeMcp.Core.Tests.csproj
          --no-build
          --configuration Release
          --filter "FullyQualifiedName~DotnetNativeMcp.Core.Tests.Fuzz"
          --logger "trx;LogFileName=fuzz-results.trx"
          --results-directory fuzz-results

      - name: Upload fuzz results (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: fuzz-results
          path: fuzz-results/
          retention-days: 30
