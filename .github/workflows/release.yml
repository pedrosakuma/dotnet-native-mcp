name: Release

# Publishes NuGet package (global tool) + per-OS single-file binaries on tag push.
# Requires the maintainer to have configured the NUGET_API_KEY secret.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to use when invoking manually (e.g. 0.4.2-rc.1). Required for workflow_dispatch.'
        required: true
        type: string

permissions:
  contents: write   # required to create + attach artifacts to a Release

jobs:
  # ----- 1) Build + pack the NuGet package (global tool) -----
  pack:
    name: Pack NuGet package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Derive version from tag (or workflow_dispatch input)
        id: derive-version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Pack global tool
        run: |
          dotnet pack src/DotnetNativeMcp.Server/DotnetNativeMcp.Server.csproj \
            -c Release \
            -o artifacts/nupkg \
            -p:Version=${{ steps.derive-version.outputs.version }} \
            --no-restore

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/nupkg/*.nupkg
          if-no-files-found: error

  # ----- 2) Build per-OS single-file self-contained binaries -----
  publish-binaries:
    name: Publish single-file binary (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: ubuntu-latest,  rid: linux-arm64 }
          - { os: windows-latest, rid: win-x64 }
          - { os: windows-latest, rid: win-arm64 }
          - { os: macos-latest,   rid: osx-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish self-contained single-file binary
        shell: bash
        run: |
          dotnet publish src/DotnetNativeMcp.Server/DotnetNativeMcp.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ needs.pack.outputs.version }} \
            -o artifacts/${{ matrix.rid }}

      - name: Rename binary to dotnet-native-mcp
        shell: bash
        # We rename post-publish (instead of -p:AssemblyName=...) because passing
        # AssemblyName as a global MSBuild property propagates to the referenced
        # Core project, renaming its DLL to the same name and triggering NETSDK1152
        # "multiple publish output files with the same relative path".
        run: |
          cd artifacts/${{ matrix.rid }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv DotnetNativeMcp.Server.exe dotnet-native-mcp.exe
          else
            mv DotnetNativeMcp.Server dotnet-native-mcp
          fi

      - name: Zip artifact
        shell: bash
        run: |
          cd artifacts/${{ matrix.rid }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../dotnet-native-mcp-${{ needs.pack.outputs.version }}-${{ matrix.rid }}.zip dotnet-native-mcp.exe appsettings*.json
          else
            tar -czf ../dotnet-native-mcp-${{ needs.pack.outputs.version }}-${{ matrix.rid }}.tar.gz dotnet-native-mcp appsettings*.json
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: |
            artifacts/dotnet-native-mcp-*.tar.gz
            artifacts/dotnet-native-mcp-*.zip
          if-no-files-found: error

  # ----- 3) Attach everything to a GitHub Release (tag-driven only) -----
  release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: [pack, publish-binaries]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nupkg/*.nupkg
            artifacts/binary-*/dotnet-native-mcp-*

  # ----- 4) Publish NuGet package (gated on NUGET_API_KEY) -----
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack, publish-binaries]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts/nupkg

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::NUGET_API_KEY secret not set — skipping NuGet.org publish."
            exit 0
          fi
          dotnet nuget push "artifacts/nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
