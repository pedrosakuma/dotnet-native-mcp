name: Release

# Publishes NuGet package (global tool) + per-OS single-file binaries on tag push.
# Requires the maintainer to have configured the NUGET_API_KEY secret.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to use when invoking manually (e.g. 0.4.2-rc.1). Required for workflow_dispatch.'
        required: true
        type: string

# Default to read-only at workflow scope; jobs opt in to write/OIDC explicitly.
permissions:
  contents: read

jobs:
  # ----- 1) Build + pack the NuGet package (global tool) -----
  pack:
    name: Pack NuGet package
    runs-on: ubuntu-latest
    # OIDC + attestations are needed in this job to mint a Sigstore cert and
    # publish the SLSA attestation for the nupkg. No write to repo contents.
    permissions:
      contents: read
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.derive-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Derive version from tag (or workflow_dispatch input)
        id: derive-version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Pack global tool
        run: |
          dotnet pack src/DotnetNativeMcp.Server/DotnetNativeMcp.Server.csproj \
            -c Release \
            -o artifacts/nupkg \
            -p:Version=${{ steps.derive-version.outputs.version }} \
            --no-restore

      - name: Attest nupkg provenance
        # SHA-pinned (v4.1.0). attest-build-provenance is a composite wrapper
        # whose inner actions/attest is already SHA-pinned upstream; pinning
        # the wrapper closes the remaining floating-tag exposure on the
        # release path. Update via Dependabot (see .github/dependabot.yml).
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/nupkg/*.nupkg'

      - name: Upload nupkg
        uses: actions/upload-artifact@v6
        with:
          name: nupkg
          path: artifacts/nupkg/*.nupkg
          if-no-files-found: error

  # ----- 2) Build per-OS single-file self-contained binaries -----
  publish-binaries:
    name: Publish single-file binary (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: pack
    # OIDC + attestations are needed per matrix entry to attest the per-RID
    # archive. No write to repo contents.
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: ubuntu-latest,  rid: linux-arm64 }
          - { os: windows-latest, rid: win-x64 }
          - { os: windows-latest, rid: win-arm64 }
          - { os: macos-latest,   rid: osx-arm64 }
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish self-contained single-file binary
        shell: bash
        run: |
          dotnet publish src/DotnetNativeMcp.Server/DotnetNativeMcp.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ needs.pack.outputs.version }} \
            -o artifacts/${{ matrix.rid }}

      - name: Rename binary to dotnet-native-mcp
        shell: bash
        # We rename post-publish (instead of -p:AssemblyName=...) because passing
        # AssemblyName as a global MSBuild property propagates to the referenced
        # Core project, renaming its DLL to the same name and triggering NETSDK1152
        # "multiple publish output files with the same relative path".
        run: |
          cd artifacts/${{ matrix.rid }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv DotnetNativeMcp.Server.exe dotnet-native-mcp.exe
          else
            mv DotnetNativeMcp.Server dotnet-native-mcp
          fi

      - name: Zip artifact
        shell: bash
        run: |
          cd artifacts/${{ matrix.rid }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../dotnet-native-mcp-${{ needs.pack.outputs.version }}-${{ matrix.rid }}.zip dotnet-native-mcp.exe appsettings*.json
          else
            tar -czf ../dotnet-native-mcp-${{ needs.pack.outputs.version }}-${{ matrix.rid }}.tar.gz dotnet-native-mcp appsettings*.json
          fi

      - name: Attest binary archive provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # Attests the archive itself; consumers verify the archive directly
          # via `gh attestation verify`.
          subject-path: |
            artifacts/dotnet-native-mcp-*.tar.gz
            artifacts/dotnet-native-mcp-*.zip

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.rid }}
          path: |
            artifacts/dotnet-native-mcp-*.tar.gz
            artifacts/dotnet-native-mcp-*.zip
          if-no-files-found: error

  # ----- 3) Attach everything to a GitHub Release (tag-driven only) -----
  release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: [pack, publish-binaries]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # Needs write to create the GitHub Release; no OIDC/attestations here —
    # those were minted in pack/publish-binaries against the artifact digests.
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create / update Release
        # SHA-pinned (v3.0.0). Third-party action with contents: write — pin to
        # avoid a moved major tag silently publishing tampered releases.
        # Update via Dependabot (see .github/dependabot.yml).
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            artifacts/nupkg/*.nupkg
            artifacts/binary-*/dotnet-native-mcp-*

  # ----- 4) Publish NuGet package (gated on NUGET_API_KEY) -----
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack, publish-binaries]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # Read-only: this job consumes an artifact and pushes to nuget.org via
    # NUGET_API_KEY. It does not need contents:write, OIDC, or attestations.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Download nupkg
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: artifacts/nupkg

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::NUGET_API_KEY secret not set — skipping NuGet.org publish."
            exit 0
          fi
          dotnet nuget push "artifacts/nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
